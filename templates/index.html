<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Infraestructura</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; }
        header { background: #16213e; padding: 20px 40px; border-bottom: 2px solid #0f3460; }
        header h1 { color: #e94560; font-size: 24px; }
        header p { color: #aaa; font-size: 14px; margin-top: 4px; }
        .container { padding: 40px; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #16213e; padding: 20px 30px; border-radius: 8px; text-align: center; flex: 1; }
        .stat-card h2 { font-size: 36px; font-weight: bold; }
        .stat-card p { color: #aaa; font-size: 14px; margin-top: 4px; }
        .activo h2 { color: #4ecca3; }
        .inactivo h2 { color: #e94560; }
        .mantenimiento h2 { color: #f5a623; }
        table { width: 100%; border-collapse: collapse; background: #16213e; border-radius: 8px; overflow: hidden; }
        th { background: #0f3460; padding: 14px 20px; text-align: left; font-size: 13px; color: #aaa; text-transform: uppercase; }
        td { padding: 14px 20px; border-bottom: 1px solid #0f3460; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-activo { background: #1a3a2a; color: #4ecca3; }
        .badge-inactivo { background: #3a1a1a; color: #e94560; }
        .badge-mantenimiento { background: #3a2a1a; color: #f5a623; }
        .btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin: 2px; }
        .btn-activo { background: #4ecca3; color: #1a1a2e; }
        .btn-inactivo { background: #e94560; color: white; }
        .btn-mantenimiento { background: #f5a623; color: #1a1a2e; }
        .loading { text-align: center; padding: 40px; color: #aaa; }
    </style>
</head>
<body>
    <header>
        <h1>🖥️ Monitor de Infraestructura</h1>
        <p>Panel de estado de servidores en tiempo real</p>
    </header>
    <div class="container">
        <div class="stats">
            <div class="stat-card activo">
                <h2 id="count-activo">0</h2>
                <p>Activos</p>
            </div>
            <div class="stat-card inactivo">
                <h2 id="count-inactivo">0</h2>
                <p>Inactivos</p>
            </div>
            <div class="stat-card mantenimiento">
                <h2 id="count-mantenimiento">0</h2>
                <p>En mantenimiento</p>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>IP</th>
                    <th>Estado</th>
                    <th>Descripción</th>
                    <th>Último chequeo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-servidores">
                <tr><td colspan="6" class="loading">Cargando servidores...</td></tr>
            </tbody>
        </table>
    </div>
    <script>
        const API = '/api/servidores/';

        async function cargarServidores() {
            const res = await fetch(API);
            const servidores = await res.json();
            renderTabla(servidores);
            renderStats(servidores);
        }

        function renderStats(servidores) {
            document.getElementById('count-activo').textContent = servidores.filter(s => s.estado === 'activo').length;
            document.getElementById('count-inactivo').textContent = servidores.filter(s => s.estado === 'inactivo').length;
            document.getElementById('count-mantenimiento').textContent = servidores.filter(s => s.estado === 'mantenimiento').length;
        }

        function renderTabla(servidores) {
            const tbody = document.getElementById('tabla-servidores');
            tbody.innerHTML = servidores.map(s => `
                <tr>
                    <td>${s.nombre}</td>
                    <td>${s.ip}</td>
                    <td><span class="badge badge-${s.estado}">${s.estado}</span></td>
                    <td>${s.descripcion}</td>
                    <td>${new Date(s.fecha_ultimo_chequeo).toLocaleString('es-AR')}</td>
                    <td>
                        <button class="btn btn-activo" onclick="cambiarEstado(${s.id}, 'activo')">Activo</button>
                        <button class="btn btn-inactivo" onclick="cambiarEstado(${s.id}, 'inactivo')">Inactivo</button>
                        <button class="btn btn-mantenimiento" onclick="cambiarEstado(${s.id}, 'mantenimiento')">Mant.</button>
                    </td>
                </tr>
            `).join('');
        }

        async function cambiarEstado(id, nuevoEstado) {
            const csrfToken = document.cookie.split('; ').
                find(row => row.startsWith('csrftoken='))
                ?.split('=')[1];

            await fetch(`${API}${id}/`, {
                method: 'PATCH',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken 
                },
                body: JSON.stringify({ estado: nuevoEstado })
            });
            cargarServidores();
        }

        cargarServidores();
    </script>
</body>
</html>
